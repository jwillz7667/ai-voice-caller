[build]
  base = "webapp"
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "18"

# Handle client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

# Redirect from /index.html to /
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

# Support for environment variables in runtime
[functions]
  directory = "netlify/functions"
